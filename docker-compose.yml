services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    env_file:
      - .env
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - sqlserver
    env_file:
      - .env
    ports:
      - "5000:5000"
    restart: unless-stopped

volumes:
  sqlserver_data:
